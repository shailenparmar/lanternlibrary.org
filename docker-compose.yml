services:
  db:
    image: pgvector/pgvector:pg16
    container_name: lanternlibrary-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lantern
      POSTGRES_PASSWORD: lantern
      POSTGRES_DB: lanternlibrary
    ports:
      - "5433:5432"
    volumes:
      - lantern-pgdata:/var/lib/postgresql/data
      - ./drizzle/init:/docker-entrypoint-initdb.d:ro

volumes:
  lantern-pgdata:
